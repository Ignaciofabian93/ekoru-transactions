name: 'ekoru-transactions-redis-prod'

# Production Redis backing the BullMQ queue. Managed INDEPENDENTLY of the app:
# start it once and leave it running — app deploys (compose.prod.yml) never touch
# it, so in-flight/queued jobs are never disrupted by a redeploy.
#
#   docker compose -f redis.prod.yml up -d        # start (once)
#   docker compose -f redis.prod.yml logs -f      # inspect
#
# Requires .env.prod present (for REDIS_PASSWORD) and the external `ekoru-network`
# to exist. Not published to the host — reachable only over the network, by the
# container name `ekoru-transactions-redis` (= REDIS_HOST in .env.prod).
services:
  ekoru-transactions-redis:
    image: redis:7-alpine
    restart: always
    container_name: ekoru-transactions-redis
    env_file:
      - .env.prod
    # noeviction: BullMQ stores job state as keys — eviction loses jobs.
    # appendonly: survive restarts (queued/in-flight refund jobs).
    command: >
      sh -c 'exec redis-server
      --requirepass "$$REDIS_PASSWORD"
      --maxmemory-policy noeviction
      --appendonly yes'
    volumes:
      - ekoru-transactions-redis-data:/data
    networks:
      - ekoru-network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M
    healthcheck:
      test: ['CMD-SHELL', 'redis-cli -a "$$REDIS_PASSWORD" ping | grep -q PONG']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  ekoru-transactions-redis-data:

networks:
  ekoru-network:
    external: true
