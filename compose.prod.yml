name: 'ekoru-transactions-prod'

# App only. Redis is a separate, independently-managed container (see
# redis.prod.yml) so app redeploys never recreate the stateful queue store —
# same split search uses for Typesense. The app reaches Redis over ekoru-network
# by container name (REDIS_HOST in .env.prod).
services:
  ekoru-transactions:
    image: ekoru-transactions:prod
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    container_name: ekoru-transactions
    env_file:
      - .env.prod
    ports:
      - '4107:4007'
    networks:
      - ekoru-network
    deploy:
      resources:
        limits:
          cpus: '2.0' # Maximum 2 CPU cores (production environment)
          memory: 1G # Maximum 1GB RAM (production environment)
        reservations:
          cpus: '0.5' # Minimum 0.5 CPU cores reserved
          memory: 512M # Minimum 512MB RAM reserved
    healthcheck:
      test:
        [
          'CMD',
          'wget',
          '--quiet',
          '--tries=1',
          '--spider',
          'http://localhost:4107/health',
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  ekoru-network:
    external: true
